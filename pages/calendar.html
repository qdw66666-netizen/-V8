<!DOCTYPE html>
<html lang="zh-CN">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1">

<title>档期管理</title>

<link rel="stylesheet" href="../css/style.css">

</head>


<body>


<div class="card">


<h1>
📅 档期管理
</h1>


<input id="date" type="date">


<input id="title" placeholder="拍摄内容">


<input id="customer" placeholder="客户">


<button onclick="saveCalendar()">

保存档期

</button>



<h3>
拍摄安排
</h3>


<div id="list"></div>


</div>



<script src="../js/database.js"></script>

<script src="../js/storage.js"></script>


<script>


function saveCalendar(){


let item={


date:date.value,


title:title.value,


customer:customer.value


};


naonaoDB.calendar.push(item);


saveDB();


show();


}



function show(){


let html="";


naonaoDB.calendar.forEach(c=>{


html+=`

<div class="item">

日期：
${c.date}

<br>

内容：
${c.title}

<br>

客户：
${c.customer}

</div>

`;

});


list.innerHTML=html;


}



show();


</script>


</body>

</html>
