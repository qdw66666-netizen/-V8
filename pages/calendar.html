<!DOCTYPE html>

<html lang="zh-CN">


<head>


<meta charset="UTF-8">


<meta name="viewport" content="width=device-width,initial-scale=1">


<title>
档期管理
</title>


<link rel="stylesheet" href="../css/style.css">


</head>


<body>



<div class="card">


<h1>
📅 档期管理 V8.1
</h1>



<h3>
新增安排
</h3>



<input

id="date"

type="date"

>



<input

id="customer"

placeholder="客户姓名"

>



<input

id="project"

placeholder="项目名称"

>



<select id="type">


<option>
拍摄
</option>


<option>
修图
</option>


<option>
交付
</option>


</select>



<select id="status">


<option>
待开始
</option>


<option>
进行中
</option>


<option>
已完成
</option>


</select>



<button onclick="saveCalendar()">

保存档期

</button>




<hr>



<h3>
全部档期
</h3>



<div id="list"></div>



</div>





<script src="../js/database.js"></script>

<script src="../js/storage.js"></script>




<script>




// 保存档期


function saveCalendar(){



if(checkDate()){


alert("当天已有安排，请检查！");


return;


}




let data={



date:
date.value,


customer:
customer.value,


project:
project.value,


type:
type.value,


status:
status.value



};





naonaoDB.calendar.push(data);



saveDB();



clear();



show();



}





// 检查日期冲突


function checkDate(){



return naonaoDB.calendar.some(item=>{


return item.date==date.value;


});


}





function clear(){


date.value="";


customer.value="";


project.value="";


}






// 显示列表


function show(){



let html="";



naonaoDB.calendar.forEach((c,index)=>{



html+=`

<div class="item">


<h3>

${c.date}

</h3>



客户：

${c.customer}


<br><br>



项目：

${c.project}


<br><br>



类型：

${c.type}



<br>


状态：

${c.status}



<br><br>



<button onclick="changeStatus(${index})">

修改状态

</button>



<button onclick="removeCalendar(${index})">

删除

</button>



</div>


`;



});



list.innerHTML=html;



}





// 修改状态


function changeStatus(index){



let arr=[


"待开始",


"进行中",


"已完成"


];



let now=

naonaoDB.calendar[index].status;



let i=

arr.indexOf(now);



if(i<arr.length-1){


naonaoDB.calendar[index].status=

arr[i+1];


}


else{


naonaoDB.calendar[index].status=

arr[0];


}



saveDB();



show();



}




// 删除


function removeCalendar(index){



if(confirm("删除这个档期？")){


naonaoDB.calendar.splice(index,1);


saveDB();


show();


}



}





show();



</script>



</body>


</html>
