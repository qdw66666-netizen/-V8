<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1">

<title>交付中心</title>

<link rel="stylesheet" href="../css/style.css">

</head>


<body>


<div class="card">


<h1>
📦 交付中心
</h1>


<input id="customer" placeholder="客户">


<input id="photo" placeholder="照片数量">


<input id="video" placeholder="视频数量">


<select id="status">


<option>
待交付
</option>


<option>
已交付
</option>


</select>



<button onclick="saveDelivery()">

保存

</button>



<div id="list"></div>


</div>



<script src="../js/database.js"></script>

<script src="../js/storage.js"></script>



<script>


function saveDelivery(){


naonaoDB.delivery.push({


customer:customer.value,


photo:photo.value,


video:video.value,


status:status.value


});


saveDB();


show();


}



function show(){


let html="";


naonaoDB.delivery.forEach(d=>{


html+=`

<div class="item">


客户：
${d.customer}

<br>


照片：
${d.photo}

<br>


视频：
${d.video}

<br>


状态：
${d.status}


</div>


`;

});


list.innerHTML=html;


}



show();


</script>


</body>

</html>
