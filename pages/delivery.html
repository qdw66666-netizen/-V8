<!DOCTYPE html>

<html lang="zh-CN">


<head>


<meta charset="UTF-8">


<meta name="viewport" content="width=device-width,initial-scale=1">


<title>
交付中心
</title>


<link rel="stylesheet" href="../css/style.css">


</head>



<body>



<div class="card">



<h1>
📦 交付中心 V8.1
</h1>




<h3>
新增交付记录
</h3>




<input

id="customer"

placeholder="客户姓名"

>




<input

id="project"

placeholder="项目名称"

>




<input

id="photo"

placeholder="照片数量"

type="number"

>




<input

id="video"

placeholder="视频数量"

type="number"

>




<select id="method">


<option>
网盘链接
</option>


<option>
微信发送
</option>


<option>
U盘交付
</option>


<option>
现场交付
</option>


</select>




<select id="status">


<option>
待客户确认
</option>


<option>
客户已确认
</option>


<option>
已归档
</option>


</select>




<button onclick="saveDelivery()">

保存交付

</button>




<hr>




<h3>
交付列表
</h3>




<div id="list"></div>




</div>






<script src="../js/database.js"></script>

<script src="../js/storage.js"></script>



<script>




// 保存交付


function saveDelivery(){



let data={



customer:
customer.value,


project:
project.value,


photo:
Number(photo.value),


video:
Number(video.value),


method:
method.value,


status:
status.value,


date:
new Date().toLocaleDateString()



};





naonaoDB.delivery.push(data);



saveDB();



clear();



show();



}




function clear(){


customer.value="";


project.value="";


photo.value="";


video.value="";


}







// 显示


function show(){



let html="";



naonaoDB.delivery.forEach((d,index)=>{



html+=`


<div class="item">


<h3>

${d.project}

</h3>



客户：

${d.customer}



<br><br>



照片：

${d.photo} 张



<br>



视频：

${d.video} 个



<br><br>



方式：

${d.method}



<br>



状态：

${d.status}



<br>



日期：

${d.date}



<br><br>



<button onclick="changeStatus(${index})">

修改状态

</button>



<button onclick="removeDelivery(${index})">

删除

</button>



</div>


`;



});



list.innerHTML=html;



}







// 状态流程


function changeStatus(index){



let arr=[


"待客户确认",


"客户已确认",


"已归档"


];



let now=

naonaoDB.delivery[index].status;



let i=

arr.indexOf(now);




if(i<arr.length-1){


naonaoDB.delivery[index].status=

arr[i+1];


}



else{


naonaoDB.delivery[index].status=

arr[0];


}



saveDB();



show();



}





// 删除


function removeDelivery(index){



if(confirm("删除交付记录？")){


naonaoDB.delivery.splice(index,1);


saveDB();


show();


}


}




show();



</script>



</body>


</html>
