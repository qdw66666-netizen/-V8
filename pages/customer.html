<!DOCTYPE html>

<html lang="zh-CN">


<head>


<meta charset="UTF-8">


<meta name="viewport" content="width=device-width,initial-scale=1">


<title>
客户管理
</title>


<link rel="stylesheet" href="../css/style.css">


</head>



<body>



<div class="card">



<h1>
👤 客户管理 V8.1
</h1>



<!-- 搜索客户 -->


<input

id="search"

placeholder="搜索客户姓名或电话"

oninput="searchCustomer()"

>



<h3>
新增客户
</h3>



<input

id="name"

placeholder="客户姓名"

>


<input

id="phone"

placeholder="联系电话"

>


<input

id="wechat"

placeholder="微信"

>


<textarea

id="remark"

placeholder="客户备注"

></textarea>



<button onclick="saveCustomer()">

保存客户

</button>



<hr>



<h3>
客户列表
</h3>



<div id="list"></div>



</div>





<script src="../js/database.js"></script>

<script src="../js/storage.js"></script>



<script>



// 保存客户


function saveCustomer(){



let data={


name:name.value,


phone:phone.value,


wechat:wechat.value,


remark:remark.value,


time:
new Date().toLocaleDateString()


};




naonaoDB.customers.push(data);



saveDB();



clear();



show();



}



// 清空输入


function clear(){


name.value="";


phone.value="";


wechat.value="";


remark.value="";


}





// 显示客户


function show(){


let html="";



naonaoDB.customers.forEach((c,index)=>{


let projectCount=0;


let totalMoney=0;



// 自动统计项目


naonaoDB.projects.forEach(p=>{


if(p.customer==c.name){


projectCount++;


totalMoney += Number(p.money||0);


}


});





html+=`

<div class="item">


<h3>

${c.name}

</h3>



电话：

${c.phone}


<br><br>



微信：

${c.wechat}



<br><br>


项目数量：

${projectCount}



<br>


消费金额：

¥${totalMoney}



<br><br>


备注：

${c.remark}



<br><br>



<button onclick="detail(${index})">

客户详情

</button>



<button onclick="deleteCustomer(${index})">

删除

</button>



</div>


`;



});



list.innerHTML=html;



}




// 客户详情


function detail(index){



let c=
naonaoDB.customers[index];



let projects="";



naonaoDB.projects.forEach(p=>{


if(p.customer==c.name){


projects +=

"\n"+p.name+
"  ¥"+p.money;


}



});




alert(

"客户："+c.name+

"\n电话："+c.phone+

"\n微信："+c.wechat+

"\n项目："+projects

);



}





// 删除客户


function deleteCustomer(index){


if(confirm("确定删除客户吗？")){


naonaoDB.customers.splice(index,1);



saveDB();



show();


}



}





// 搜索


function searchCustomer(){



let key=
search.value;



let html="";



naonaoDB.customers.forEach((c,index)=>{



if(

c.name.includes(key)

||

c.phone.includes(key)

){



html+=`


<div class="item">


<h3>${c.name}</h3>


电话：

${c.phone}


<br>


微信：

${c.wechat}


<br>


备注：

${c.remark}



</div>


`;



}



});



list.innerHTML=html;



}





show();



</script>



</body>


</html>
