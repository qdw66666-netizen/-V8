<script>



function loadData(){



customers.innerHTML =

naonaoDB.customers.length;



projects.innerHTML =

naonaoDB.projects.length;



editing.innerHTML =

naonaoDB.editing.length;



delivery.innerHTML =

naonaoDB.delivery.length;




let money=0;



if(
naonaoDB.finance.records
){


naonaoDB.finance.records.forEach(r=>{


money += Number(r.money||0);


});


}



income.innerHTML=money;





let total=0;



naonaoDB.projects.forEach(p=>{


total += Number(p.money||0);


});



pending.innerHTML=

total-money;



}



loadData();
