<!DOCTYPE html>

<html lang="zh-CN">


<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1">

<title>
图片资产管理
</title>


<link rel="stylesheet" href="../css/style.css">


</head>



<body>


<div class="card">


<h1>
📷 图片资产库 V8.2
</h1>



<h3>
新增图片记录
</h3>



<input

id="customer"

placeholder="客户姓名"

>



<input

id="project"

placeholder="项目名称"

>



<input

id="count"

placeholder="图片数量"

type="number"

>




<select id="category">


<option>
原片
</option>


<option>
精选
</option>


<option>
精修
</option>


<option>
交付
</option>


</select>




<select id="choose">


<option>
未选片
</option>


<option>
已选片
</option>


<option>
已确认
</option>


</select>




<button onclick="savePhoto()">

保存图片资产

</button>




<hr>




<h3>
图片列表
</h3>



<div id="list"></div>



</div>





<script src="../js/database.js"></script>

<script src="../js/storage.js"></script>



<script>





// 保存图片


function savePhoto(){


let data={


customer:
customer.value,


project:
project.value,


count:
Number(count.value),


category:
category.value,


choose:
choose.value,


time:
new Date().toLocaleDateString()


};



naonaoDB.photos.push(data);



saveDB();



clear();


show();


}




function clear(){


customer.value="";


project.value="";


count.value="";


}






// 显示


function show(){


let html="";



naonaoDB.photos.forEach((p,index)=>{


html+=`


<div class="item">


<h3>

${p.project}

</h3>



客户：

${p.customer}


<br><br>



数量：

${p.count} 张


<br>


分类：

${p.category}



<br>


选片：

${p.choose}



<br>


日期：

${p.time}



<br><br>



<button onclick="change(${index})">

修改状态

</button>



<button onclick="removePhoto(${index})">

删除

</button>



</div>


`;



});



list.innerHTML=html;



}







// 修改选片状态


function change(index){


let arr=[


"未选片",


"已选片",


"已确认"


];



let now=

naonaoDB.photos[index].choose;



let i=

arr.indexOf(now);



if(i<arr.length-1){


naonaoDB.photos[index].choose=

arr[i+1];


}


else{


naonaoDB.photos[index].choose=

arr[0];


}



saveDB();


show();


}






// 删除


function removePhoto(index){


if(confirm("删除图片记录？")){


naonaoDB.photos.splice(index,1);



saveDB();


show();



}



}





show();



</script>


</body>


</html>
