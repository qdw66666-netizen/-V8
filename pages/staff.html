<!DOCTYPE html>

<html lang="zh-CN">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1">

<title>
员工管理
</title>


<link rel="stylesheet" href="../css/style.css">


</head>


<body>


<div class="card">


<h1>
👥 员工管理 V8.5
</h1>



<h3>
新增员工
</h3>



<input 
id="name"
placeholder="员工姓名"
>


<input 
id="phone"
placeholder="联系电话"
>



<select id="role">


<option>
摄影师
</option>


<option>
修图师
</option>


<option>
客服
</option>


<option>
管理员
</option>


</select>




<button onclick="saveStaff()">

保存员工

</button>



<hr>



<h3>
员工列表
</h3>


<div id="list"></div>



</div>




<script src="../js/database.js"></script>

<script src="../js/storage.js"></script>



<script>


// 初始化

if(!naonaoDB.staff){

naonaoDB.staff=[];

}



// 保存员工


function saveStaff(){



let data={


name:name.value,


phone:phone.value,


role:role.value,


time:new Date().toLocaleDateString()


};



naonaoDB.staff.push(data);



saveDB();



clear();


show();



}




function clear(){


name.value="";


phone.value="";


}




function show(){



let html="";



naonaoDB.staff.forEach((s,index)=>{


html+=`

<div class="item">


<h3>

${s.name}

</h3>



电话：

${s.phone}



<br><br>



职位：

${s.role}



<br>



加入：

${s.time}



<br><br>



<button onclick="removeStaff(${index})">

删除

</button>



</div>


`;



});



list.innerHTML=html;



}





function removeStaff(index){


if(confirm("删除员工？")){


naonaoDB.staff.splice(index,1);



saveDB();



show();


}



}




show();



</script>



</body>


</html>
