<!DOCTYPE html>

<html lang="zh-CN">


<head>


<meta charset="UTF-8">


<meta name="viewport" content="width=device-width,initial-scale=1">


<title>
修图中心
</title>


<link rel="stylesheet" href="../css/style.css">


</head>



<body>



<div class="card">



<h1>
🎨 修图中心 V8.1
</h1>




<h3>
新增修图任务
</h3>




<input

id="customer"

placeholder="客户姓名"

>



<input

id="project"

placeholder="项目名称"

>




<input

id="original"

placeholder="原片数量"

type="number"

>



<input

id="retouch"

placeholder="精修数量"

type="number"

>




<input

id="worker"

placeholder="后期人员"

>




<select id="status">


<option>
待修图
</option>


<option>
修图中
</option>


<option>
客户选片
</option>


<option>
已完成
</option>


</select>





<button onclick="saveEditing()">

保存修图任务

</button>




<hr>




<h3>
修图任务列表
</h3>




<div id="list"></div>




</div>







<script src="../js/database.js"></script>

<script src="../js/storage.js"></script>




<script>





// 保存任务


function saveEditing(){



let data={


customer:
customer.value,


project:
project.value,


original:
Number(original.value),


retouch:
Number(retouch.value),


worker:
worker.value,


status:
status.value,


progress:
0,


time:
new Date().toLocaleDateString()


};





naonaoDB.editing.push(data);



saveDB();



clear();



show();



}





function clear(){


customer.value="";


project.value="";


original.value="";


retouch.value="";


worker.value="";


}







// 显示任务


function show(){



let html="";




naonaoDB.editing.forEach((e,index)=>{



html+=`


<div class="item">


<h3>

${e.project}

</h3>



客户：

${e.customer}


<br><br>



原片：

${e.original}

张


<br>



精修：

${e.retouch}

张


<br><br>



后期：

${e.worker}


<br>



状态：

${e.status}


<br>



完成度：

${e.progress}%



<br><br>



<button onclick="addProgress(${index})">

提升进度

</button>



<button onclick="deleteTask(${index})">

删除

</button>



</div>



`;



});



list.innerHTML=html;



}






// 增加进度


function addProgress(index){



let p=

naonaoDB.editing[index].progress;



p+=20;



if(p>100){

p=100;

}



naonaoDB.editing[index].progress=p;



if(p==100){

naonaoDB.editing[index].status="已完成";

}



saveDB();



show();



}






// 删除任务


function deleteTask(index){



if(confirm("删除修图任务？")){


naonaoDB.editing.splice(index,1);


saveDB();


show();


}


}







show();



</script>



</body>


</html>
