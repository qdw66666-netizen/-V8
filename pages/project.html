<!DOCTYPE html>
<html lang="zh-CN">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1">

<title>
项目管理
</title>


<link rel="stylesheet" href="../css/style.css">


</head>


<body>


<div class="card">


<h1>
📷 项目管理 V8.1
</h1>



<!-- 搜索 -->

<input 
id="search"
placeholder="搜索客户或者项目"
oninput="searchProject()"
>



<!-- 新增项目 -->


<h3>
新增项目
</h3>


<input 
id="customer"
placeholder="客户姓名"
>


<input 
id="projectName"
placeholder="项目名称"
>


<input 
id="money"
placeholder="项目金额"
>


<select id="status">


<option>
待拍摄
</option>


<option>
已拍摄
</option>


<option>
未晒图
</option>


<option>
未修图
</option>


<option>
修图中
</option>


<option>
待交付
</option>


<option>
已完成
</option>


</select>


<button onclick="saveProject()">

保存项目

</button>



<hr>


<h3>
项目列表
</h3>


<div id="list"></div>



</div>


<script src="../js/database.js"></script>

<script src="../js/storage.js"></script>

<script src="../js/app.js"></script>



<script>


// 保存项目


function saveProject(){



let data={


customer:
customer.value,


name:
projectName.value,


money:
money.value,


status:
status.value,


time:
new Date().toLocaleDateString()



};



naonaoDB.projects.push(data);



saveDB();



clearInput();


show();



}



// 清空输入


function clearInput(){


customer.value="";


projectName.value="";


money.value="";


}



// 显示列表


function show(){


let html="";



naonaoDB.projects.forEach((p,index)=>{


html+=`


<div class="item">


<h3>

${p.name}

</h3>



客户：

${p.customer}


<br><br>


金额：

¥${p.money}


<br><br>


状态：

<span>

${p.status}

</span>


<br>


创建时间：

${p.time}



<br><br>



<button onclick="changeStatus(${index})">

修改状态

</button>



<button onclick="detail(${index})">

查看详情

</button>



<button onclick="deleteProject(${index})">

删除项目

</button>



</div>


`;



});



list.innerHTML=html;



}




// 删除项目


function deleteProject(index){


if(confirm("确定删除这个项目吗？")){


naonaoDB.projects.splice(index,1);


saveDB();


show();


}


}



// 修改状态


function changeStatus(index){



let arr=[


"待拍摄",

"已拍摄",

"未晒图",

"未修图",

"修图中",

"待交付",

"已完成"


];



let now=
naonaoDB.projects[index].status;



let i=
arr.indexOf(now);



if(i<arr.length-1){


naonaoDB.projects[index].status=
arr[i+1];


}else{


naonaoDB.projects[index].status=
arr[0];


}



saveDB();


show();


}




// 查看详情


function detail(index){


let p=
naonaoDB.projects[index];


alert(

"项目："+p.name+

"\n客户："+p.customer+

"\n金额："+p.money+

"\n状态："+p.status

);



}



// 搜索


function searchProject(){


let key=
search.value;



let html="";



naonaoDB.projects.forEach((p,index)=>{


if(

p.name.includes(key)

||

p.customer.includes(key)

){



html+=`

<div class="item">


项目：

${p.name}


<br>


客户：

${p.customer}


<br>


状态：

${p.status}


</div>


`;



}



});



list.innerHTML=html;



}





show();



</script>



</body>


</html>
