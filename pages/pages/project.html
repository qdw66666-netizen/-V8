<!DOCTYPE html>

<html>


<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1">

<title>项目管理</title>

<link rel="stylesheet" href="../css/style.css">

</head>


<body>


<div class="card">


<h1>
📷 项目管理
</h1>


<input id="customer" placeholder="客户姓名">


<input id="projectName" placeholder="项目名称">


<input id="money" placeholder="金额">


<select id="status">


<option>
待拍摄
</option>


<option>
已拍摄
</option>


<option>
未晒图
</option>


<option>
未修图
</option>


<option>
修图中
</option>


<option>
待交付
</option>


<option>
已完成
</option>


</select>



<button onclick="saveProject()">

保存项目

</button>



<h3>
项目列表
</h3>


<div id="list"></div>



</div>



<script src="../js/database.js"></script>

<script src="../js/storage.js"></script>

<script src="../js/app.js"></script>



<script>


function saveProject(){


let p={


customer:customer.value,

name:projectName.value,

money:money.value,

status:status.value


};


addProject(p);


show();


}



function show(){


let html="";


naonaoDB.projects.forEach(p=>{


html+=`

<div class="item">


项目：
${p.name}


<br>


客户：
${p.customer}


<br>


金额：
${p.money}


<br>


状态：
${p.status}



</div>

`;


});


list.innerHTML=html;


}


show();


</script>


</body>

</html>
