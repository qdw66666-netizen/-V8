<!DOCTYPE html>

<html lang="zh-CN">


<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1">

<title>
财务中心
</title>


<link rel="stylesheet" href="../css/style.css">


</head>



<body>


<div class="card">


<h1>
💰 财务中心 V8.3
</h1>



<div class="item">

项目总金额：

¥<span id="totalProject"></span>

</div>



<div class="item">

已收金额：

¥<span id="received"></span>

</div>



<div class="item">

待收尾款：

¥<span id="pending"></span>

</div>



<div class="item">

成本支出：

¥<span id="expense"></span>

</div>



<div class="item">

预计利润：

¥<span id="profit"></span>

</div>




<hr>



<h3>

新增收款记录

</h3>


<input 
id="customer"
placeholder="客户姓名"
>


<input 
id="project"
placeholder="项目名称"
>


<input 
id="money"
placeholder="收款金额"
type="number"
>



<select id="type">


<option>
定金
</option>


<option>
中期款
</option>


<option>
尾款
</option>


</select>




<button onclick="saveFinance()">

保存收款

</button>



<hr>



<h3>

财务记录

</h3>


<div id="list"></div>



<h3>

添加成本

</h3>


<input 
id="cost"
placeholder="成本金额"
type="number"
>


<button onclick="addCost()">

记录成本

</button>



</div>






<script src="../js/database.js"></script>

<script src="../js/storage.js"></script>




<script>



// 初始化财务数据


if(!naonaoDB.finance.records){

naonaoDB.finance.records=[];

}



if(!naonaoDB.finance.expenses){

naonaoDB.finance.expenses=[];

}






// 保存收款


function saveFinance(){


let data={


customer:
customer.value,


project:
project.value,


money:
Number(money.value),


type:
type.value,


date:
new Date().toLocaleDateString()


};



naonaoDB.finance.records.push(data);



saveDB();



clear();


show();



}



function clear(){


customer.value="";


project.value="";


money.value="";


}







// 添加成本


function addCost(){



naonaoDB.finance.expenses.push({


money:Number(cost.value),


date:
new Date().toLocaleDateString()


});



saveDB();



cost.value="";


show();


}








// 统计


function calculate(){



let total=0;


let receive=0;


let expense=0;





// 项目金额


naonaoDB.projects.forEach(p=>{


total += Number(p.money||0);


});




// 收款


naonaoDB.finance.records.forEach(r=>{


receive += Number(r.money||0);


});




// 成本


naonaoDB.finance.expenses.forEach(e=>{


expense += Number(e.money||0);


});





totalProject.innerHTML=total;


received.innerHTML=receive;


pending.innerHTML=
total-receive;


this.expense.innerHTML=expense;


profit.innerHTML=
receive-expense;



}








// 显示记录


function show(){


let html="";



naonaoDB.finance.records.forEach((r,index)=>{


html+=`

<div class="item">


客户：

${r.customer}


<br>


项目：

${r.project}


<br>


金额：

¥${r.money}


<br>


类型：

${r.type}


<br>


日期：

${r.date}



<button onclick="removeFinance(${index})">

删除

</button>


</div>


`;


});



list.innerHTML=html;



calculate();



}








function removeFinance(index){



naonaoDB.finance.records.splice(index,1);


saveDB();


show();



}





show();



</script>



</body>


</html>
